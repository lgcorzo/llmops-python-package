apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-agent-config
  namespace: agents
data:
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "litellm/ollama/qwen2.5:7b",
      "provider": {
        "litellm": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "LiteLLM Gateway (Dark Gravity)",
          "options": {
            "baseURL": "http://litellm.llm-apps.svc.cluster.local/v1",
            "apiKey": "REPLACE_ME_LITELLM_API_KEY",
            "headers": {
              "HTTP-Referer": "opencode",
              "X-Title": "OpenCode"
            }
          },
          "litellmProxy": true,
          "instructions": [
            "Eres un experto en DevOps y automatización.",
            "Responde siempre en español.",
            "Utiliza las herramientas disponibles (bash, edit, read, etc.) de forma proactiva para resolver las tareas del usuario.",
            "No expliques demasiado lo que vas a hacer, simplemente hazlo usando la herramienta adecuada.",
            "Mantén tus respuestas directas y útiles."
          ],
          "models": {
            "ollama/qwen2.5:7b": {
              "name": "Qwen 2.5 7B (via LiteLLM)"
            },
            "ollama/deepseek-r1:8b": {
              "name": "DeepSeek R1 8B (via LiteLLM)"
            }
          }
        }
      },
      "mcp": {
        "factory": {
          "type": "remote",
          "url": "http://mcp-server.agents.svc.cluster.local:8200/sse",
          "enabled": true
        }
      },
      "permission": {
        "bash": "allow",
        "edit": "allow",
        "write": "allow",
        "webfetch": "allow",
        "websearch": "allow",
        "read": "allow",
        "grep": "allow",
        "glob": "allow",
        "list": "allow",
        "factory_*": "allow"
      }
    }
