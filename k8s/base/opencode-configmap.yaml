apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-agent-config
  namespace: agents
data:
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "litellm/ollama/qwen2.5:7b",
      "provider": {
        "litellm": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "LiteLLM Gateway (Dark Gravity)",
          "options": {
            "baseURL": "http://litellm.llm-apps.svc.cluster.local/v1",
            "apiKey": "REPLACE_ME_LITELLM_API_KEY",
            "headers": {
              "HTTP-Referer": "opencode",
              "X-Title": "OpenCode"
            }
          },
          "litellmProxy": true,
          "instructions": [
            "Eres un experto en programación, DevOps y automatización.",
            "Responde siempre en español.",
            "Para llamar a una herramienta (tool call), debes devolver obligatoriamente el objeto JSON correspondiente dentro de las etiquetas <tool_call> y </tool_call>. No uses bloques de código markdown ni añadas texto antes o después.",
            "IMPORTANTE: Cada llamada a herramienta (tool call) DEBE incluir obligatoriamente el campo 'description' dentro de 'arguments' explicando brevemente la acción.",
            "Ejemplo de formato obligatorio: <tool_call>{\\\"name\\\": \\\"bash\\\", \\\"arguments\\\": {\\\"command\\\": \\\"ls\\\", \\\"description\\\": \\\"Listar el contenido del directorio actual\\\"}}</tool_call>"
          ],
          "models": {
            "ollama/qwen2.5:7b": {
              "name": "Qwen 2.5  7B"
            }
          }
        }
      },
      "mcp": {
        "factory": {
          "type": "remote",
          "url": "http://mcp-server.agents.svc.cluster.local:8200/sse",
          "enabled": false
        }
      },
      "permission": {
        "bash": "allow",
        "edit": "allow",
        "write": "allow",
        "webfetch": "allow",
        "websearch": "allow",
        "read": "allow",
        "grep": "allow",
        "glob": "allow",
        "list": "allow",
        "plan_enter": "allow",
        "plan_exit": "allow",
        "factory_*": "allow"
      }
    }
